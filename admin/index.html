<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Super Admin - GCV</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../images/favicon.ico">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gerenciamento de Lojas</h1>
            <div style="display: flex; gap: 10px;">
                <button class="action-btn btn-ativar" id="btn-nova-loja" style="padding: 10px 15px; font-weight: bold;">+ Nova Loja</button>
                <button class="btn-voltar" onclick="window.location.href='../index.html'">Voltar ao Sistema</button>
            </div>
        </header>

        <div id="loading" class="loading">Verificando permissões e carregando dados...</div>
        
        <table id="tabela-lojas" style="display:none;">
            <thead>
                <tr>
                    <th>Loja / Empresa</th>
                    <th>Login (Dono)</th>
                    <th>CNPJ / CPF</th>
                    <th>Status</th>
                    <th style="text-align: right;">Ações</th>
                </tr>
            </thead>
            <tbody id="tbody-lojas"></tbody>
        </table>
    </div>

    <div id="modal-funcionarios" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close btn-fechar-modal">×</button>
            <h2 class="modal-title">Funcionários da Loja</h2>
            <div id="lista-funcionarios" class="users-list">
                <p style="color:#888; text-align:center;">Carregando...</p>
            </div>
        </div>
    </div>

    <div id="modal-confirmacao" class="modal-overlay">
        <div class="modal-box" style="max-width: 400px; text-align: center;">
            <h2 id="modal-confirm-titulo" class="modal-title" style="border:none; padding:0; margin-bottom:10px;">Confirmar</h2>
            <p id="modal-confirm-texto" style="color:#ccc; margin-bottom: 25px;">Tem certeza?</p>
            <div style="display: flex; justify-content: center; gap: 10px;">
                <button class="action-btn btn-voltar btn-fechar-modal" style="background:#444;">Cancelar</button>
                <button id="btn-confirm-acao" class="action-btn">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="modal-nova-loja" class="modal-overlay">
        <div class="modal-box" style="max-width: 400px;">
            <button class="modal-close btn-fechar-modal">×</button>
            <h2 class="modal-title">Cadastrar Nova Loja</h2>
            
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">Nome da Empresa/Loja</label>
                <input type="text" id="novo-nome" placeholder="Ex: Decorart" style="width:100%; padding:10px; background:#333; border:1px solid #555; color:#fff; border-radius:5px;" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">Nome do Proprietário</label>
                <input type="text" id="novo-dono" placeholder="Ex: João da Silva" style="width:100%; padding:10px; background:#333; border:1px solid #555; color:#fff; border-radius:5px;" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">CNPJ ou CPF</label>
                <input type="text" id="novo-cnpj" placeholder="Apenas números" style="width:100%; padding:10px; background:#333; border:1px solid #555; color:#fff; border-radius:5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">Telefone / WhatsApp</label>
                <input type="text" id="novo-telefone" placeholder="Ex: 11999999999" style="width:100%; padding:10px; background:#333; border:1px solid #555; color:#fff; border-radius:5px;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">E-mail de Login do Proprietário</label>
                <input type="email" id="novo-email" placeholder="E-mail para login" style="width:100%; padding:10px; background:#333; border:1px solid #555; color:#fff; border-radius:5px;" required>
            </div>
            
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button class="action-btn btn-voltar btn-fechar-modal" style="background:#444;">Cancelar</button>
                <button id="btn-salvar-nova-loja" class="action-btn btn-ativar">Criar Loja</button>
            </div>
        </div>
    </div>

    <div id="modal-editar-loja" class="modal-overlay">
        <div class="modal-box" style="max-width: 450px;">
            <button class="modal-close btn-fechar-modal">×</button>
            <h2 class="modal-title">Detalhes da Loja</h2>
            
            <style>
                .edit-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
                .edit-label { font-size: 12px; color: #888; display: block; margin-bottom: 2px; }
                .edit-value { color: #fff; font-size: 15px; font-weight: 500; }
                .btn-edit-field { background: none; border: none; color: #e06c6e; cursor: pointer; padding: 5px; font-size: 14px; }
                .btn-edit-field:hover { color: #fff; }
                .edit-input { background: #333; border: 1px solid #555; color: #fff; padding: 5px; border-radius: 4px; display: none; width: 60%; }
            </style>

            <div id="dados-loja-container">
                <!-- Conteúdo gerado no script.js -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
