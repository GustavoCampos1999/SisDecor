<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Painel Admin</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" type="image/png" href="../images/favicon.ico">
</head>
<body>
    <div class="login-container">
        <img src="../images/MainLogo.png" alt="Logo" id="login-logo">

        <div id="saved-accounts-container" style="display: none; margin-bottom: 20px;">
            <p style="color: #666; margin-bottom: 15px;">Selecione uma conta salva:</p>
            <div id="saved-accounts-list" style="display: flex; flex-direction: column; gap: 10px;">
                <!-- Lista de contas salvas -->
            </div>
            <button type="button" id="btn-outra-conta">Entrar com outra conta</button>
        </div>

        <form id="form-login">
            <div id="voltar-contas-salvas-container" style="display: none; text-align: left; margin-bottom: 15px;">
                <button type="button" id="btn-voltar-salvas" style="background: none; border: none; color: #b11518; cursor: pointer; font-size: 13px; font-weight: bold; padding: 0;">&larr; Ver contas salvas</button>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Login" required>
            </div>
            <div>
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Senha">
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 13px;">
                <label style="display: flex; align-items: center; gap: 8px; color: #555; cursor: pointer; font-weight: normal; margin: 0;">
                    <input type="checkbox" id="chk-salvar-conta" style="width: auto; margin: 0; cursor: pointer;"> 
                    <span>Salvar conta</span>
                </label>
                <a href="forgot-password.html" class="login-link">Esqueci minha senha</a>
            </div>

            <button type="submit">Entrar</button>
            <p id="mensagem-erro" class="message-error"></p>
        </form>

        <div class="login-link-container">
            <p class="login-description" style="margin-bottom: 5px;">Não tem uma conta?</p> 
            <button id="btn-contato" style="background-color: transparent; border: 2px solid #931011; color: #931011; border-radius: 5px; padding: 10px 15px; font-weight: bold; cursor: pointer; width: 100%;">Entre em contato</button>
        </div>
    </div>

    <!-- Modal WhatsApp -->
    <div id="modal-whatsapp" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 10px; max-width: 350px; text-align: center; position: relative;">
            <button id="btn-fechar-whatsapp" style="position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 24px; cursor: pointer; color: #555; padding: 0;">&times;</button>
            <h2 style="margin-top: 0; color: #333; font-size: 20px;">Fale Conosco</h2>
            <p style="color: #666; margin-bottom: 20px; font-size: 14px;">Entre em contato pelo WhatsApp para adquirir sua licença ou tirar dúvidas.</p>
            <div>
                <p style="color: #888; font-size: 14px; margin-bottom: 10px;">Escaneie o código abaixo:</p>
                <img src="../images/qr.png" alt="QR Code WhatsApp" style="width: 200px; max-width: 100%; border: 1px solid #eee; border-radius: 10px; margin-bottom: 15px;">
            </div>
            <a href="https://wa.link/gfrggv" target="_blank" style="display: flex; align-items: center; justify-content: center; gap: 10px; background-color: #25D366; color: white; text-decoration: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; width: 100%; box-sizing: border-box; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="../images/whatsapp.png" alt="" style="height: 24px;">
                Enviar Mensagem no WhatsApp
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="login.js"></script>
</body>
</html>
